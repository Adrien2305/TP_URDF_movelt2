# Controllers configuration for MoveIt 2
# En simulation RViz, on utilise le FakeController (pas de hardware réel)

moveit_controller_manager: moveit_ros_control_interface/MoveItControllerManager

moveit_simple_controller_manager:
  controller_names:
    - arm_controller
    - gripper_controller

  arm_controller:
    type: FollowJointTrajectory
    joints:
      - joint1
      - joint2
      - joint3
      - joint_claw

  gripper_controller:
    type: FollowJointTrajectory
    joints:
      - joint4
